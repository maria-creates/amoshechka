<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>С днём рождения, Амошечка!</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,.42), transparent 28%),
        linear-gradient(135deg, #aaa, #c7c7c7 50%, #aaa);
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      padding: 2px;
    }

    .card {
      width: min(660px, 100%);
      margin: 0 auto;
      background: #fff;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px #8f8f8f, 7px 7px 0 rgba(0,0,0,.1);
      padding: 8px 8px 12px;
      position: relative;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: 14px;
      filter: drop-shadow(1px 1px 0 #000);
      user-select: none;
      z-index: 1;
    }
    .s1 { left: 8px; top: 4px; }
    .s2 { right: 8px; top: 44px; }
    .s3 { left: 12px; bottom: 95px; }

    .title {
      text-align: center;
      line-height: .84;
      margin: 0 auto 6px;
      max-width: 620px;
      position: relative;
      z-index: 2;
    }

    .word {
      display: inline-block;
      margin: 0 .03em .06em;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-weight: 900;
      letter-spacing: .01em;
      -webkit-text-stroke: 1.1px #111;
      paint-order: stroke fill;
      filter: drop-shadow(2px 3px 0 rgba(0,0,0,.24));
    }

    .w1 {
      font-size: clamp(24px, 4vw, 48px);
      background: linear-gradient(#8eefff 8%, #1170ff 55%, #092184 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transform: rotate(-4deg);
    }
    .w2 {
      font-size: clamp(28px, 4.6vw, 54px);
      background: linear-gradient(180deg, #fff619 0 33%, #ff4b00 34% 67%, #7c0000 68%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke-color: #8f1200;
      transform: skewX(-8deg) rotate(2deg);
    }
    .w3 {
      font-size: clamp(30px, 5vw, 58px);
      background: linear-gradient(#ff71f4, #8428ff 58%, #2a007c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke-color: #26005c;
      transform: rotate(-2deg);
    }
    .name {
      display: block;
      font-size: clamp(32px, 5.8vw, 66px);
      background: linear-gradient(90deg,#ff0000,#ff8a00,#ffe600,#21d629,#00aaff,#6740ff,#ff2ec4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1.5px #111;
      filter: drop-shadow(2px 0 0 #fff) drop-shadow(4px 4px 0 rgba(0,0,0,.22));
    }

    .handheld {
      width: min(320px, 100%);
      margin: 0 auto;
      background: linear-gradient(180deg, #efb7da 0%, #e29cc9 54%, #d983ba 100%);
      border-radius: 18px;
      padding: 7px 9px 10px;
      border: 2px solid #bf5f96;
      box-shadow:
        inset 0 5px 10px rgba(255,255,255,.38),
        inset 0 -6px 10px rgba(162,73,122,.2),
        5px 6px 0 rgba(0,0,0,.08);
    }

    .screen-shell {
      border: 3px solid #23201d;
      background: #dc8fbd;
      padding: 6px 4px 7px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.14);
    }

    .screen-panel {
      background: linear-gradient(180deg, #cf79ad, #c96fa6);
      padding: 4px;
    }

    canvas {
      width: 100%;
      max-width: 240px;
      aspect-ratio: 4 / 5;
      display: block;
      margin: 0 auto;
      background: #111;
      image-rendering: pixelated;
      touch-action: manipulation;
    }

    .score-line {
      text-align: center;
      font: 800 11px "Courier New", monospace;
      margin: 5px 0 5px;
      color: #25121e;
    }

    .controls-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 0;
    }

    .dpad {
      width: 98px;
      height: 92px;
      position: relative;
      flex: 0 0 auto;
      transform: translateY(4px);
    }

    .dpad button,
    .round-button,
    .music-button,
    .reset-button {
      border: 2px solid #bf5f96;
      background: linear-gradient(180deg, #f5b7db 0%, #e58dbc 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.4), 0 1px 2px rgba(123,47,89,.26);
      color: #4b1736;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .dpad button {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font: 900 15px/1 Arial, sans-serif;
      padding: 0;
    }
    .d-up { left: 32px; top: 0; }
    .d-left { left: 0; top: 29px; }
    .d-right { right: 0; top: 29px; }
    .d-down { left: 32px; bottom: 0; }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 76px;
    }

    .round-button,
    .music-button,
    .reset-button {
      width: 100%;
      border-radius: 11px;
      font-weight: 800;
      line-height: 1;
      padding: 6px 4px;
    }
    .round-button { min-height: 29px; font-size: 10px; }
    .music-button { min-height: 31px; font-size: 8.8px; }
    .reset-button {
      min-height: 28px;
      font-size: 10px;
      border-color: #0c0c0c;
      background: linear-gradient(180deg, #1d1d1d, #000);
      color: #fff;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.1), 0 1px 2px rgba(0,0,0,.22);
    }
    button:active { transform: translateY(1px); }

    .tagline {
      margin: 7px auto 0;
      text-align: center;
      line-height: .9;
    }
    .tag1, .tag2, .tag3, .tag4 {
      display: inline-block;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-weight: 900;
      -webkit-text-stroke: .9px #111;
      paint-order: stroke fill;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,.18));
      margin: 0 .04em .04em;
    }
    .tag1 {
      font-size: clamp(17px, 2.6vw, 28px);
      background: linear-gradient(#9df6ff,#00aaff 60%,#1150c9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      transform: rotate(-6deg);
    }
    .tag2 {
      font-size: clamp(21px, 3vw, 33px);
      background: linear-gradient(#fff16a,#ff8c00 65%,#b33600);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      transform: skewX(-9deg) rotate(2deg);
    }
    .tag3 {
      font-size: clamp(20px, 2.9vw, 31px);
      background: linear-gradient(#efb3ff,#a63cff 60%,#5400a8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tag4 {
      display: block;
      font-size: clamp(21px, 3.1vw, 36px);
      background: linear-gradient(90deg,#ff1f99,#ff6b00,#ffe600,#21d629,#00aaff,#7e47ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    @media (max-width: 420px) {
      body { padding: 0; }
      .card { border-width: 1px; box-shadow: none; padding: 6px 5px 9px; }
      .handheld { width: min(292px, 100%); }
      canvas { max-width: 220px; }
      .controls-wrap { gap: 9px; }
      .dpad { width: 90px; height: 84px; }
      .dpad button { width: 31px; height: 31px; font-size: 14px; }
      .d-up { left: 29px; }
      .d-left { top: 27px; }
      .d-right { top: 27px; }
      .d-down { left: 29px; }
      .right-panel { width: 72px; }
      .round-button { font-size: 9.5px; min-height: 27px; }
      .music-button { font-size: 8px; min-height: 29px; }
      .reset-button { font-size: 9.5px; min-height: 26px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">⭐</div>
    <div class="sparkle s3">✨</div>

    <h1 class="title">
      <span class="word w1">С</span>
      <span class="word w2">ДНЁМ</span>
      <span class="word w3">РОЖДЕНИЯ,</span>
      <span class="word name">АМОШЕЧКА!</span>
    </h1>

    <audio id="bgm" loop preload="auto">
      <source src="Basta_-_Moya_Igra_Ringtone_by_Dj_Evdokimov_Version_1_(SkySound.cc).mp3" type="audio/mpeg">
    </audio>

    <section class="handheld">
      <div class="screen-shell">
        <div class="screen-panel">
          <canvas id="game" width="480" height="600" aria-label="Игра тетрис"></canvas>
        </div>
      </div>

      <div class="score-line">очки: <span id="score">0</span></div>

      <div class="controls-wrap">
        <div class="dpad">
          <button class="d-up" data-action="rotate" aria-label="Поворот">▲</button>
          <button class="d-left" data-action="left" aria-label="Влево">◀</button>
          <button class="d-right" data-action="right" aria-label="Вправо">▶</button>
          <button class="d-down" data-action="down" aria-label="Вниз">▼</button>
        </div>

        <div class="right-panel">
          <button class="round-button" data-action="rotate">поворот</button>
          <button class="music-button" id="musicToggle">включить трек</button>
          <button class="reset-button" id="restart">сброс</button>
        </div>
      </div>
    </section>

    <div class="tagline">
      <span class="tag1">вся</span>
      <span class="tag2">жизнь</span>
      <span class="tag3">игра,</span>
      <span class="tag4">играй в кайф!</span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    const COLS = 16, ROWS = 20;
    const BLOCK = canvas.width / COLS;
    const DROP_INTERVAL = 650;

    const COLORS = {
      I: '#26d9ff', J: '#4169ff', L: '#ff9d2e', O: '#ffe438',
      S: '#55e85a', T: '#b45cff', Z: '#ff4c5e'
    };

    const SHAPES = {
      I: [[1,1,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
      O: [[1,1],[1,1]],
      S: [[0,1,1],[1,1,0]],
      T: [[0,1,0],[1,1,1]],
      Z: [[1,1,0],[0,1,1]]
    };

    let board, piece, score, running, timer;

    function makeBoard() {
      return Array.from({length: ROWS}, () => Array(COLS).fill(null));
    }

    function randomPiece() {
      const types = Object.keys(SHAPES);
      const type = types[Math.floor(Math.random() * types.length)];
      const matrix = SHAPES[type].map(row => [...row]);
      return { type, matrix, x: Math.floor((COLS - matrix[0].length) / 2), y: -1 };
    }

    function reset() {
      clearInterval(timer);
      board = makeBoard();
      score = 0;
      running = true;
      scoreEl.textContent = score;
      piece = randomPiece();
      timer = setInterval(drop, DROP_INTERVAL);
      draw();
    }

    function collide(testPiece = piece) {
      for (let y = 0; y < testPiece.matrix.length; y++) {
        for (let x = 0; x < testPiece.matrix[y].length; x++) {
          if (!testPiece.matrix[y][x]) continue;
          const bx = testPiece.x + x, by = testPiece.y + y;
          if (bx < 0 || bx >= COLS || by >= ROWS) return true;
          if (by >= 0 && board[by][bx]) return true;
        }
      }
      return false;
    }

    function merge() {
      piece.matrix.forEach((row, y) => row.forEach((value, x) => {
        if (value && piece.y + y >= 0) board[piece.y + y][piece.x + x] = piece.type;
      }));
      score += 10;
      scoreEl.textContent = score;
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(Boolean)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared) {
        score += [0, 100, 300, 500, 800][cleared];
        scoreEl.textContent = score;
      }
    }

    function spawn() {
      piece = randomPiece();
      if (collide()) gameOver();
    }

    function drop() {
      if (!running) return;
      piece.y++;
      if (collide()) {
        piece.y--;
        merge();
        clearLines();
        spawn();
      }
      draw();
    }

    function move(dx) {
      if (!running) return;
      piece.x += dx;
      if (collide()) piece.x -= dx;
      draw();
    }

    function softDrop() {
      if (!running) return;
      piece.y++;
      if (collide()) {
        piece.y--;
        merge();
        clearLines();
        spawn();
      }
      draw();
    }

    function rotateMatrix(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function rotatePiece() {
      if (!running || piece.type === 'O') return;
      const old = piece.matrix, oldX = piece.x;
      piece.matrix = rotateMatrix(piece.matrix);
      for (const offset of [0, -1, 1, -2, 2]) {
        piece.x = oldX + offset;
        if (!collide()) { draw(); return; }
      }
      piece.matrix = old;
      piece.x = oldX;
    }

    function gameOver() {
      running = false;
      clearInterval(timer);
      draw();
      ctx.fillStyle = 'rgba(0,0,0,.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 34px Arial';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '20px Courier New';
      ctx.fillText('очки: ' + score, canvas.width / 2, canvas.height / 2 + 28);
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
      ctx.strokeStyle = 'rgba(255,255,255,.65)';
      ctx.strokeRect(x * BLOCK + 2, y * BLOCK + 2, BLOCK - 5, BLOCK - 5);
      ctx.strokeStyle = 'rgba(0,0,0,.35)';
      ctx.strokeRect(x * BLOCK + .5, y * BLOCK + .5, BLOCK - 1, BLOCK - 1);
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,.05)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * BLOCK, 0); ctx.lineTo(x * BLOCK, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * BLOCK); ctx.lineTo(canvas.width, y * BLOCK); ctx.stroke();
      }
      board.forEach((row, y) => row.forEach((type, x) => {
        if (type) drawCell(x, y, COLORS[type]);
      }));
      if (piece) piece.matrix.forEach((row, y) => row.forEach((value, x) => {
        const py = piece.y + y;
        if (value && py >= 0) drawCell(piece.x + x, py, COLORS[piece.type]);
      }));
    }

    document.addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','ArrowDown','ArrowUp',' '].includes(e.key)) e.preventDefault();
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 'ф') move(-1);
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd' || e.key.toLowerCase() === 'в') move(1);
      if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's' || e.key.toLowerCase() === 'ы') softDrop();
      if (e.key === 'ArrowUp' || e.key === ' ' || e.key.toLowerCase() === 'w' || e.key.toLowerCase() === 'ц') rotatePiece();
    });

    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'left') move(-1);
        if (btn.dataset.action === 'right') move(1);
        if (btn.dataset.action === 'down') softDrop();
        if (btn.dataset.action === 'rotate') rotatePiece();
      });
    });

    document.getElementById('restart').addEventListener('click', reset);

    const bgm = document.getElementById('bgm');
    const musicToggle = document.getElementById('musicToggle');
    bgm.volume = .45;
    musicToggle.addEventListener('click', async () => {
      try {
        if (bgm.paused) {
          await bgm.play();
          musicToggle.textContent = 'пауза трека';
        } else {
          bgm.pause();
          musicToggle.textContent = 'включить трек';
        }
      } catch {
        musicToggle.textContent = 'нажми ещё раз';
      }
    });

    reset();
  </script>
</body>
</html>

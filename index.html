<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>С днём рождения, Амошечка!</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      background: #fff;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      overflow-x: hidden;
    }

    .card {
      width: min(700px, 100%);
      margin: 0 auto;
      background: #fff;
      padding: 8px 10px 14px;
      position: relative;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      font-size: 15px;
      filter: drop-shadow(1px 1px 0 #000);
      user-select: none;
      z-index: 1;
    }
    .s1 { left: 10px; top: 5px; }
    .s2 { right: 10px; top: 46px; }
    .s3 { left: 14px; bottom: 98px; }

    .title {
      text-align: center;
      line-height: .84;
      margin: 0 auto 7px;
      max-width: 650px;
      position: relative;
      z-index: 2;
    }

    .word {
      display: inline-block;
      margin: 0 .03em .06em;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-weight: 900;
      letter-spacing: .01em;
      -webkit-text-stroke: 1.1px #111;
      paint-order: stroke fill;
      filter: drop-shadow(2px 3px 0 rgba(0,0,0,.24));
    }

    .w1 {
      font-size: clamp(24px, 4vw, 48px);
      background: linear-gradient(#8eefff 8%, #1170ff 55%, #092184 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      transform: rotate(-4deg);
    }
    .w2 {
      font-size: clamp(28px, 4.6vw, 54px);
      background: linear-gradient(180deg, #fff619 0 33%, #ff4b00 34% 67%, #7c0000 68%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke-color: #8f1200;
      transform: skewX(-8deg) rotate(2deg);
    }
    .w3 {
      font-size: clamp(30px, 5vw, 58px);
      background: linear-gradient(#ff71f4, #8428ff 58%, #2a007c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke-color: #26005c;
      transform: rotate(-2deg);
    }
    .name {
      display: block;
      font-size: clamp(32px, 5.8vw, 66px);
      background: linear-gradient(90deg,#ff0000,#ff8a00,#ffe600,#21d629,#00aaff,#6740ff,#ff2ec4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1.5px #111;
      filter: drop-shadow(2px 0 0 #fff) drop-shadow(4px 4px 0 rgba(0,0,0,.22));
    }

    .handheld {
      width: min(340px, 100%);
      margin: 0 auto;
      background: linear-gradient(180deg, #efb7da 0%, #e29cc9 54%, #d983ba 100%);
      border-radius: 20px;
      padding: 8px 10px 12px;
      border: 2px solid #bf5f96;
      box-shadow:
        inset 0 5px 10px rgba(255,255,255,.38),
        inset 0 -6px 10px rgba(162,73,122,.2),
        5px 6px 0 rgba(0,0,0,.08);
    }

    .screen-shell {
      border: 3px solid #23201d;
      background: #dc8fbd;
      padding: 6px 5px 8px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.14);
    }

    .screen-panel {
      position: relative;
      background: linear-gradient(180deg, #cf79ad, #c96fa6);
      padding: 4px;
    }

    canvas {
      width: 100%;
      max-width: 240px;
      aspect-ratio: 4 / 5;
      display: block;
      margin: 0 auto;
      background: #111;
      image-rendering: pixelated;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .score-line {
      text-align: center;
      font: 800 9px "Courier New", monospace;
      margin: 6px 0 2px;
      color: #25121e;
    }

    .meta-line {
      text-align: center;
      font: 800 7.5px "Courier New", monospace;
      margin: 0 0 3px;
      color: #4a223a;
      white-space: nowrap;
    }

    .controls-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
    }

    .dpad {
      width: 128px;
      height: 108px;
      position: relative;
      flex: 0 0 auto;
    }

    .dpad button,
    .music-button,
    .dark-button {
      border: 2px solid #bf5f96;
      background: linear-gradient(180deg, #f5b7db 0%, #e58dbc 100%);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.4), 0 2px 3px rgba(123,47,89,.25);
      color: #4b1736;
      cursor: pointer;
      font-family: Arial, sans-serif;
      font-weight: 800;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .dpad button {
      position: absolute;
      height: 32px;
      border-radius: 18px;
      font-size: 9.5px;
      line-height: 1;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .d-up { width: 72px; left: 28px; top: 0; }
    .d-left, .d-right { width: 58px; top: 38px; }
    .d-left { left: 0; }
    .d-right { right: 0; }
    .d-down { width: 56px; left: 36px; bottom: 0; }

    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 92px;
      justify-content: center;
    }

    .music-button,
    .dark-button {
      width: 100%;
      min-height: 30px;
      border-radius: 15px;
      padding: 6px 5px;
      font-size: 8px;
      line-height: 1;
    }

    .dark-button {
      border-color: #111;
      background: linear-gradient(180deg, #222, #000);
      color: #fff;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.1),
        0 0 0 2px #39b8ff,
        0 2px 3px rgba(0,0,0,.25);
    }

    button:active { transform: translateY(1px); }

    .start-overlay,
    .pause-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.56);
      z-index: 5;
    }
    .start-overlay.hidden,
    .pause-overlay.hidden { display: none; }

    .start-game,
    .resume-game {
      border: 2px solid #fff;
      border-radius: 18px;
      background: linear-gradient(180deg,#ff8ad2,#d83291);
      color: #fff;
      font: 900 14px Arial,sans-serif;
      padding: 10px 18px;
      box-shadow: 0 3px 0 rgba(0,0,0,.28);
      cursor: pointer;
      touch-action: manipulation;
    }

    .tagline {
      margin: 8px auto 0;
      text-align: center;
      line-height: .9;
    }
    .tag1, .tag2, .tag3, .tag4 {
      display: inline-block;
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-weight: 900;
      -webkit-text-stroke: .9px #111;
      paint-order: stroke fill;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,.18));
      margin: 0 .04em .04em;
    }
    .tag1 {
      font-size: clamp(17px, 2.6vw, 28px);
      background: linear-gradient(#9df6ff,#00aaff 60%,#1150c9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      transform: rotate(-6deg);
    }
    .tag2 {
      font-size: clamp(21px, 3vw, 33px);
      background: linear-gradient(#fff16a,#ff8c00 65%,#b33600);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      transform: skewX(-9deg) rotate(2deg);
    }
    .tag3 {
      font-size: clamp(20px, 2.9vw, 31px);
      background: linear-gradient(#efb3ff,#a63cff 60%,#5400a8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tag4 {
      display: block;
      font-size: clamp(21px, 3.1vw, 36px);
      background: linear-gradient(90deg,#ff1f99,#ff6b00,#ffe600,#21d629,#00aaff,#7e47ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    @media (max-width: 420px) {
      .card {
        width: 100%;
        padding: 6px 4px 10px;
      }

      .handheld {
        width: min(360px, calc(100vw - 10px));
        padding: 8px 9px 12px;
      }

      canvas { max-width: 240px; }

      .controls-wrap {
        gap: 12px;
        margin-top: 10px;
      }

      .dpad {
        width: 138px;
        height: 114px;
      }

      .dpad button {
        height: 34px;
        font-size: 10px;
      }
      .d-up { width: 78px; left: 30px; }
      .d-left, .d-right { width: 64px; top: 40px; }
      .d-down { width: 62px; left: 38px; }

      .right-panel { width: 100px; }

      .music-button,
      .dark-button {
        min-height: 32px;
        font-size: 8.5px;
      }

      .score-line { font-size: 8.5px; }
      .meta-line { font-size: 7px; }
    }

    @media (min-width: 900px) {
      .card { width: min(760px, 100%); }
      .handheld { width: 350px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="sparkle s1">✨</div>
    <div class="sparkle s2">⭐</div>
    <div class="sparkle s3">✨</div>

    <h1 class="title">
      <span class="word w1">С</span>
      <span class="word w2">ДНЁМ</span>
      <span class="word w3">РОЖДЕНИЯ,</span>
      <span class="word name">АМОШЕЧКА!</span>
    </h1>

    <audio id="bgm" loop preload="auto">
      <source src="Basta_-_Moya_Igra_Ringtone_by_Dj_Evdokimov_Version_1_(SkySound.cc).mp3" type="audio/mpeg">
    </audio>

    <section class="handheld">
      <div class="screen-shell">
        <div class="screen-panel">
          <canvas id="game" width="480" height="600" aria-label="Игра тетрис"></canvas>
          <div class="start-overlay" id="startOverlay">
            <button class="start-game" id="startGame">начать игру</button>
          </div>
          <div class="pause-overlay hidden" id="pauseOverlay">
            <button class="resume-game" id="resumeGame">продолжить</button>
          </div>
        </div>
        <div class="score-line">очки: <span id="score">0</span></div>
        <div class="meta-line">клавиши: ← → ↓ ↑ &nbsp;•&nbsp; рекорд: <span id="record">0</span></div>
      </div>

      <div class="controls-wrap">
        <div class="dpad">
          <button class="d-up" data-action="rotate" aria-label="Поворот">поворот</button>
          <button class="d-left" data-action="left" aria-label="Влево">влево</button>
          <button class="d-right" data-action="right" aria-label="Вправо">вправо</button>
          <button class="d-down" data-action="down" aria-label="Вниз">вниз</button>
        </div>

        <div class="right-panel">
          <button class="dark-button" id="pauseToggle">пауза</button>
          <button class="dark-button" id="restart">сброс</button>
          <button class="music-button" id="musicToggle">включить трек</button>
        </div>
      </div>
    </section>

    <div class="tagline">
      <span class="tag1">вся</span>
      <span class="tag2">жизнь</span>
      <span class="tag3">игра,</span>
      <span class="tag4">играй в кайф!</span>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const recordEl = document.getElementById('record');
    const startOverlay = document.getElementById('startOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');
    const pauseToggle = document.getElementById('pauseToggle');

    const COLS = 16;
    const ROWS = 20;
    const BLOCK = canvas.width / COLS;
    const DROP_INTERVAL = 650;
    const RECORD_KEY = 'amoshechka-tetris-record';

    const COLORS = {
      I: '#26d9ff', J: '#4169ff', L: '#ff9d2e', O: '#ffe438',
      S: '#55e85a', T: '#b45cff', Z: '#ff4c5e'
    };

    const SHAPES = {
      I: [[1,1,1,1]],
      J: [[1,0,0],[1,1,1]],
      L: [[0,0,1],[1,1,1]],
      O: [[1,1],[1,1]],
      S: [[0,1,1],[1,1,0]],
      T: [[0,1,0],[1,1,1]],
      Z: [[1,1,0],[0,1,1]]
    };

    let board = makeBoard();
    let piece = randomPiece();
    let score = 0;
    let record = Number(localStorage.getItem(RECORD_KEY) || 0);
    let running = false;
    let paused = false;
    let timer = null;

    recordEl.textContent = record;

    function makeBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function randomPiece() {
      const types = Object.keys(SHAPES);
      const type = types[Math.floor(Math.random() * types.length)];
      const matrix = SHAPES[type].map(row => [...row]);
      return {
        type,
        matrix,
        x: Math.floor((COLS - matrix[0].length) / 2),
        y: -1
      };
    }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(drop, DROP_INTERVAL);
    }

    function updateScore(nextScore) {
      score = nextScore;
      scoreEl.textContent = score;
      if (score > record) {
        record = score;
        recordEl.textContent = record;
        localStorage.setItem(RECORD_KEY, String(record));
      }
    }

    function resetGame() {
      clearInterval(timer);
      board = makeBoard();
      piece = randomPiece();
      updateScore(0);
      running = true;
      paused = false;
      pauseToggle.textContent = 'пауза';
      startOverlay.classList.add('hidden');
      pauseOverlay.classList.add('hidden');
      startTimer();
      draw();
    }

    function collide(testPiece = piece) {
      for (let y = 0; y < testPiece.matrix.length; y++) {
        for (let x = 0; x < testPiece.matrix[y].length; x++) {
          if (!testPiece.matrix[y][x]) continue;
          const bx = testPiece.x + x;
          const by = testPiece.y + y;
          if (bx < 0 || bx >= COLS || by >= ROWS) return true;
          if (by >= 0 && board[by][bx]) return true;
        }
      }
      return false;
    }

    function merge() {
      piece.matrix.forEach((row, y) => row.forEach((value, x) => {
        if (value && piece.y + y >= 0) {
          board[piece.y + y][piece.x + x] = piece.type;
        }
      }));
      updateScore(score + 10);
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(Boolean)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared) {
        updateScore(score + [0, 100, 300, 500, 800][cleared]);
      }
    }

    function spawn() {
      piece = randomPiece();
      if (collide()) gameOver();
    }

    function drop() {
      if (!running || paused) return;
      piece.y++;
      if (collide()) {
        piece.y--;
        merge();
        clearLines();
        spawn();
      }
      draw();
    }

    function move(dx) {
      if (!running || paused) return;
      piece.x += dx;
      if (collide()) piece.x -= dx;
      draw();
    }

    function softDrop() {
      if (!running || paused) return;
      piece.y++;
      if (collide()) {
        piece.y--;
        merge();
        clearLines();
        spawn();
      }
      draw();
    }

    function rotateMatrix(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function rotatePiece() {
      if (!running || paused || piece.type === 'O') return;
      const oldMatrix = piece.matrix;
      const oldX = piece.x;
      piece.matrix = rotateMatrix(piece.matrix);
      for (const offset of [0, -1, 1, -2, 2]) {
        piece.x = oldX + offset;
        if (!collide()) {
          draw();
          return;
        }
      }
      piece.matrix = oldMatrix;
      piece.x = oldX;
    }

    function setPaused(nextPaused) {
      if (!running) return;
      paused = nextPaused;
      pauseToggle.textContent = paused ? 'продолжить' : 'пауза';
      pauseOverlay.classList.toggle('hidden', !paused);
      if (paused) {
        clearInterval(timer);
      } else {
        startTimer();
      }
    }

    function gameOver() {
      running = false;
      paused = false;
      clearInterval(timer);
      pauseToggle.textContent = 'пауза';
      pauseOverlay.classList.add('hidden');
      draw();
      ctx.fillStyle = 'rgba(0,0,0,.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 34px Arial';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '20px Courier New';
      ctx.fillText('очки: ' + score, canvas.width / 2, canvas.height / 2 + 28);
      startOverlay.classList.remove('hidden');
      document.getElementById('startGame').textContent = 'ещё раз';
    }

    function drawCell(x, y, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
      ctx.strokeStyle = 'rgba(255,255,255,.65)';
      ctx.strokeRect(x * BLOCK + 2, y * BLOCK + 2, BLOCK - 5, BLOCK - 5);
      ctx.strokeStyle = 'rgba(0,0,0,.35)';
      ctx.strokeRect(x * BLOCK + .5, y * BLOCK + .5, BLOCK - 1, BLOCK - 1);
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,.05)';
      ctx.lineWidth = 1;

      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * BLOCK, 0);
        ctx.lineTo(x * BLOCK, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * BLOCK);
        ctx.lineTo(canvas.width, y * BLOCK);
        ctx.stroke();
      }

      board.forEach((row, y) => row.forEach((type, x) => {
        if (type) drawCell(x, y, COLORS[type]);
      }));

      if (piece) {
        piece.matrix.forEach((row, y) => row.forEach((value, x) => {
          const py = piece.y + y;
          if (value && py >= 0) drawCell(piece.x + x, py, COLORS[piece.type]);
        }));
      }
    }

    function runAction(action) {
      if (action === 'left') move(-1);
      if (action === 'right') move(1);
      if (action === 'down') softDrop();
      if (action === 'rotate') rotatePiece();
    }

    document.addEventListener('keydown', event => {
      if (['ArrowLeft', 'ArrowRight', 'ArrowDown', 'ArrowUp', ' '].includes(event.key)) {
        event.preventDefault();
      }
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a' || event.key.toLowerCase() === 'ф') move(-1);
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd' || event.key.toLowerCase() === 'в') move(1);
      if (event.key === 'ArrowDown' || event.key.toLowerCase() === 's' || event.key.toLowerCase() === 'ы') softDrop();
      if (event.key === 'ArrowUp' || event.key === ' ' || event.key.toLowerCase() === 'w' || event.key.toLowerCase() === 'ц') rotatePiece();
      if (event.key.toLowerCase() === 'p' || event.key.toLowerCase() === 'з') setPaused(!paused);
    });

    document.querySelectorAll('[data-action]').forEach(button => {
      button.addEventListener('pointerdown', event => {
        event.preventDefault();
        runAction(button.dataset.action);
      }, { passive: false });
    });

    document.getElementById('startGame').addEventListener('pointerdown', event => {
      event.preventDefault();
      document.getElementById('startGame').textContent = 'начать игру';
      resetGame();
    }, { passive: false });

    document.getElementById('resumeGame').addEventListener('pointerdown', event => {
      event.preventDefault();
      setPaused(false);
    }, { passive: false });

    pauseToggle.addEventListener('pointerdown', event => {
      event.preventDefault();
      setPaused(!paused);
    }, { passive: false });

    document.getElementById('restart').addEventListener('pointerdown', event => {
      event.preventDefault();
      resetGame();
    }, { passive: false });

    const bgm = document.getElementById('bgm');
    const musicToggle = document.getElementById('musicToggle');
    bgm.volume = .45;

    musicToggle.addEventListener('pointerdown', async event => {
      event.preventDefault();
      try {
        if (bgm.paused) {
          await bgm.play();
          musicToggle.textContent = 'пауза трека';
        } else {
          bgm.pause();
          musicToggle.textContent = 'включить трек';
        }
      } catch {
        musicToggle.textContent = 'нажми ещё раз';
      }
    });

    draw();
  </script>
</body>
</html>
